<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Globe Explorer - The World in 100 People</title>
    <meta name="title" content="Globe Explorer - The World in 100 People" />
    <meta name="description" content="Explore the world through data - if Earth had 100 people, where would they live? Interactive visualizations of global demographics, languages, and country comparisons." />
    <meta name="author" content="CodeCrank" />
    <meta name="theme-color" content="#1d232a" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/globe.svg" />
    <link rel="apple-touch-icon" sizes="32x32" href="/favicon-32.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://globe-explorer.codecrank.ai/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://globe-explorer.codecrank.ai/" />
    <meta property="og:title" content="Globe Explorer - The World in 100 People" />
    <meta property="og:description" content="Explore the world through data - if Earth had 100 people, where would they live? Interactive visualizations of global demographics, languages, and country comparisons." />
    <meta property="og:image" content="https://globe-explorer.codecrank.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Globe Explorer" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://globe-explorer.codecrank.ai/" />
    <meta name="twitter:title" content="Globe Explorer - The World in 100 People" />
    <meta name="twitter:description" content="Explore the world through data - if Earth had 100 people, where would they live? Interactive visualizations of global demographics, languages, and country comparisons." />
    <meta name="twitter:image" content="https://globe-explorer.codecrank.ai/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Globe Explorer",
      "description": "Interactive visualizations of global demographics, languages, and country comparisons",
      "url": "https://globe-explorer.codecrank.ai/",
      "applicationCategory": "Education",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "CodeCrank",
        "url": "https://codecrank.ai"
      }
    }
    </script>
  </head>
  <body>
    <!--
      Static skeleton inside #app: paints as soon as CSS parses, which
      happens ~1.5s earlier than Vue's first mount on mobile-throttled
      cold loads. The h1 is the Lighthouse LCP element, so it pre-painting
      drops LCP from 3000ms+ to roughly FCP-time. Vue replaces #app's
      innerHTML on mount; the static content is purely an early-paint
      placeholder that visually matches what HundredPeople.vue renders.
      Keep the markup + classes in sync with HundredPeople.vue's header
      block if either side changes.
    -->
    <div id="app">
      <div class="min-h-screen flex flex-col" aria-hidden="true">
        <main id="main-content" class="flex-1">
          <div class="container mx-auto px-4 py-8 max-w-4xl">
            <div class="text-center mb-8">
              <h1 class="text-4xl font-bold mb-2 header-gradient">The World as 100 People</h1>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
